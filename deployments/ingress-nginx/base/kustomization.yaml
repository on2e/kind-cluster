apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ingress-nginx

resources:
  - https://github.com/kubernetes/ingress-nginx//deploy/static/provider/kind?ref=controller-v1.15.1

patches:
  - path: controller-configmap.yaml
  - target:
      kind: Deployment
      name: ingress-nginx-controller
    patch: |-
      - op: add
        path: /spec/template/spec/nodeSelector/node-role.kubernetes.io~1control-plane
        value: ""
